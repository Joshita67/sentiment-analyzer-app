spring.datasource.url=jdbc:h2:mem:sentiment_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable H2 Console at /h2-console
spring.h2.console.enabled=true

# Server port configuring
server.port=8080

# Hugging Face API Configuration
huggingface.api.url=https://api-inference.huggingface.co/models/distilbert-base-uncased-finetuned-sst-2-english
huggingface.api.key=YOUR_HF_API_KEY_HERE
